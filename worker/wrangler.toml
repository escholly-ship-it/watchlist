name = "watchlist-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV Namespace binding - replace with your actual KV namespace ID
[[kv_namespaces]]
binding = "WATCHLIST_KV"
id = "YOUR_KV_NAMESPACE_ID"  # Run: wrangler kv:namespace create WATCHLIST_KV

# Scheduled trigger disabled - recommendations handled by Cowork system
# [triggers]
# crons = ["0 8 * * *"]

# Environment variables (secrets must be set via wrangler secret put)
# Required secrets:
#   wrangler secret put API_KEY
#   wrangler secret put TMDB_API_KEY
#   wrangler secret put SLACK_WEBHOOK_URL
