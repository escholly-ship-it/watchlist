<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>Watchlist</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">Watchlist</h1>
      <button class="btn-add" id="btnAdd" aria-label="Hinzufügen">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" data-filter="all">Alle</button>
      <button class="filter-chip" data-filter="movie">Filme</button>
      <button class="filter-chip" data-filter="tv">Serien</button>
      <div class="filter-divider"></div>
      <!-- Service filters will be injected dynamically -->
    </div>

    <!-- Main Content: Watchlist -->
    <main class="watchlist" id="watchlist">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎬</div>
        <p>Deine Watchlist ist leer</p>
        <p class="empty-sub">Tippe auf <strong>+</strong> um Filme und Serien hinzuzufügen</p>
      </div>
    </main>

    <!-- Add Modal -->
    <div class="modal-overlay" id="addModal">
      <div class="modal">
        <div class="modal-header">
          <h2>Hinzufügen</h2>
          <button class="modal-close" id="modalClose" aria-label="Schließen">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Search -->
        <div class="search-wrapper">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Film oder Serie suchen..." autocomplete="off" autofocus>
          <button class="search-clear hidden" id="searchClear" aria-label="Löschen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </button>
        </div>

        <!-- Search Results -->
        <div class="search-results" id="searchResults"></div>

        <!-- Service Selection (step 2) -->
        <div class="service-select hidden" id="serviceSelect">
          <div class="selected-title" id="selectedTitle"></div>
          <p class="service-prompt">Wo möchtest du es schauen?</p>
          <div class="service-grid" id="serviceGrid"></div>
          <button class="btn-save" id="btnSave">Zur Watchlist hinzufügen</button>
        </div>
      </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
      <div class="modal detail-modal">
        <div class="detail-backdrop" id="detailBackdrop"></div>
        <div class="detail-content" id="detailContent"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
