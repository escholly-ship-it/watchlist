name: Daily Watchlist Recommendations

on:
  schedule:
    - cron: '0 17 * * *' # Täglich um 18:00 deutscher Zeit (17:00 UTC)
  workflow_dispatch: # Manuell auslösbar

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send Slack recommendations
        run: node --experimental-vm-modules .github/scripts/recommendations.mjs
