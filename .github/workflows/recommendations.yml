name: Daily Watchlist Recommendations

on:
  schedule:
    - cron: '0 8 * * *' # Täglich um 8:00 UTC
  workflow_dispatch: # Manuell auslösbar

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send Slack recommendations
        run: node .github/scripts/recommendations.mjs
