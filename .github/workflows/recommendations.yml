name: Daily Watchlist Recommendations

# DISABLED: Duplicate with Cowork watchlist recommendations system
# See: https://scholly-workspace.slack.com/archives/C0AL0MBK0EL/p1773511028119139

on:
  # schedule:
  #   - cron: '0 17 * * *' # Täglich um 18:00 deutscher Zeit (17:00 UTC)
  workflow_dispatch: # Manuell auslösbar (für Tests)

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send Slack recommendations
        run: node --experimental-vm-modules .github/scripts/recommendations.mjs
