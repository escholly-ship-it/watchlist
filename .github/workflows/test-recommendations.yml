name: Test Recommendations (Branch)

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run recommendations script
        run: node .github/scripts/recommendations.mjs
